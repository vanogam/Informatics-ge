# Prod-specific configuration overrides
# This file is loaded when SPRING_PROFILES_ACTIVE=prod

# Worker configuration for prod environment
ge.freeuni.informatics.worker.idPrefix=main
ge.freeuni.informatics.worker.dockerImage=informatics/worker:0.4
ge.freeuni.informatics.worker.dockerNetwork=informatics
ge.freeuni.informatics.worker.filesPath=${INFORMATICS_HOME_DIR:/home/informatics/prod}/files
ge.freeuni.informatics.worker.logsPath=${INFORMATICS_HOME_DIR:/home/informatics/prod}/logs/worker
ge.freeuni.informatics.worker.sharedPath=${INFORMATICS_HOME_DIR:/home/informatics/prod}/files/worker/shared

# Access database path for prod (update with production path if needed)
# spring.datasource.access.url=jdbc:ucanaccess:/path/to/prod/tasks.mdb

# Host configuration for prod (update with production domain)
# ge.freeuni.informatics.host=https://your-production-domain.com

# CORS allowed origins for prod (same-origin via nginx, but listed for defense-in-depth)
# Update with your production domain
ge.freeuni.informatics.cors.allowedOrigins=https://localhost

